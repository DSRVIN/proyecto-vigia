# ============================================================
# VIGÍA – Pipeline de Integración Continua y Despliegue (CI/CD)
# Stack: Vite + React 19 · Supabase · Gemini 2.5 Flash · Vercel
# Basado en el documento APF1, secciones 14–15 (5 stages)
# ============================================================
name: VIGIA CI/CD Pipeline

# ── 1. TRIGGERS ─────────────────────────────────────────────
on:
  pull_request:
    branches: ['main', 'develop']
  push:
    branches: ['main', 'develop']

# ── 2. PERMISOS (principio de mínimo privilegio) ────────────
permissions:
  contents: read
  pull-requests: write

jobs:
  # ── STAGE 1 & 2: Setup, Lint y Format ─────────────────────
  lint:
    name: 'Stage 1-2: Setup, Lint & Format'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código fuente
        uses: actions/checkout@v4

      - name: Configurar Node.js 20 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: '[Stage 2a] Ejecutar ESLint'
        run: npm run lint

      - name: '[Stage 2b] Verificar formato con Prettier'
        run: npm run format:check

  # ── STAGE 3: Unit Tests + Coverage ──────────────────────────
  test:
    name: 'Stage 3: Unit Tests & Coverage'
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Ejecutar tests con cobertura de código
        run: npm run test:coverage

      - name: Publicar reporte de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ── STAGE 4: Build de Vite ──────────────────────────────────
  build:
    name: 'Stage 4: Vite Build Check'
    runs-on: ubuntu-latest
    needs: test
    env:
      VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL_TEST }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY_TEST }}
      VITE_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY_TEST }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Compilar la aplicación con Vite
        run: npm run build

      - name: Verificar que la carga inicial no supere 2 MB
        # Se mide el payload de primer render (entry JS + CSS). Los chunks
        # de carga diferida (ExcelJS, módulos por rol) no cuentan porque
        # solo se descargan bajo demanda.
        run: |
          INITIAL_SIZE=$(du -ck dist/assets/index-*.js dist/assets/*.css 2>/dev/null | tail -1 | cut -f1)
          TOTAL_SIZE=$(du -sk dist/assets | cut -f1)
          echo "Carga inicial: ${INITIAL_SIZE} KB · Total con chunks diferidos: ${TOTAL_SIZE} KB"
          if [ $INITIAL_SIZE -gt 2048 ]; then
            echo "ERROR: Carga inicial demasiado grande (${INITIAL_SIZE} KB > 2048 KB)"
            exit 1
          fi

  # ── STAGE 5: Auditoría de Seguridad ─────────────────────────
  security:
    name: 'Stage 5: Security Audit'
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Auditar dependencias npm (bloquea en high/critical)
        run: npm audit --audit-level=high

  # ── CD Gate: verifica que los secrets de Vercel existan ─────
  # (el contexto `secrets` no está disponible en `jobs.<id>.if`,
  #  por eso se expone como output de un job intermedio)
  deploy-gate:
    name: 'CD Gate: Verificar secrets de Vercel'
    runs-on: ubuntu-latest
    needs: security
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - name: Comprobar VERCEL_TOKEN
        id: check
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -n "$VERCEL_TOKEN" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "Secrets de Vercel configurados: se procede al deploy."
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::VERCEL_TOKEN no está configurado. Deploy omitido." \
              "Configura VERCEL_TOKEN, VERCEL_ORG_ID y VERCEL_PROJECT_ID en" \
              "Settings → Secrets and variables → Actions."
          fi

  # ── CD: Despliegue a Vercel (solo push a main con secrets) ──
  deploy:
    name: 'CD: Deploy a Vercel Production'
    runs-on: ubuntu-latest
    needs: deploy-gate
    if: needs.deploy-gate.outputs.ready == 'true'
    steps:
      - name: Checkout de código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Instalar Vercel CLI
        run: npm install --global vercel@latest

      - name: Jalar entorno de Vercel
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Validar y Compilar Proyecto
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Desplegar a Vercel Production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
